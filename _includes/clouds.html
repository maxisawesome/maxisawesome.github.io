<div id="cloud-bg" aria-hidden="true"><pre id="cloud-art"></pre></div>

<style>
  /* Layering: clouds sit above the page backdrop but behind all content. */
  html { background: #fff; }
  body { background: transparent; }
  .content { position: relative; z-index: 1; }
  .sidebar { z-index: 1; }
  /* White halo keeps text legible when the ASCII clouds rise behind it. */
  .content, .sidebar {
    text-shadow:
      0 0 1px #fff, 0 0 1px #fff, 0 0 1px #fff, 0 0 1px #fff,
      0 0 2px #fff, 0 0 2px #fff, 0 0 2px #fff, 0 0 2px #fff,
      0 0 3px #fff, 0 0 3px #fff, 0 0 5px #fff, 0 0 5px #fff,
      0 0 8px #fff, 0 0 12px #fff;
  }
  #cloud-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  #cloud-art {
    margin: 0;
    padding: 0;
    background: none;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 13px;
    line-height: 13px;
    letter-spacing: 0;
    white-space: pre;
    color: #c3ccdc;
  }
</style>

<script>
(function () {
  var art = document.getElementById("cloud-art");
  var ramp = " .:-=+*#%@";           // density ramp, sparse -> dense
  var CHAR_W = 7.8, CHAR_H = 13;      // approx monospace cell size at 13px
  var cols = 0, rows = 0;
  var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function measure() {
    cols = Math.ceil(window.innerWidth / CHAR_W) + 1;
    rows = Math.ceil(window.innerHeight / CHAR_H) + 1;
  }

  // --- 3D value noise + fBm (no libraries) ---
  function hash(x, y, z) {
    var n = (x * 374761393 + y * 668265263 + z * 2147483647) | 0;
    n = (n ^ (n >> 13)) * 1274126177 | 0;
    return ((n ^ (n >> 16)) >>> 0) / 4294967295;
  }
  function noise3(x, y, z) {
    var xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
    var xf = x - xi, yf = y - yi, zf = z - zi;
    var u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf), w = zf * zf * (3 - 2 * zf);
    function lerp(a, b, t) { return a + (b - a) * t; }
    var c000 = hash(xi, yi, zi),     c100 = hash(xi + 1, yi, zi);
    var c010 = hash(xi, yi + 1, zi), c110 = hash(xi + 1, yi + 1, zi);
    var c001 = hash(xi, yi, zi + 1),     c101 = hash(xi + 1, yi, zi + 1);
    var c011 = hash(xi, yi + 1, zi + 1), c111 = hash(xi + 1, yi + 1, zi + 1);
    var x00 = lerp(c000, c100, u), x10 = lerp(c010, c110, u);
    var x01 = lerp(c001, c101, u), x11 = lerp(c011, c111, u);
    return lerp(lerp(x00, x10, v), lerp(x01, x11, v), w);
  }
  function fbm(x, y, z) {
    var sum = 0, amp = 0.5, freq = 1;
    for (var o = 0; o < 4; o++) {
      sum += amp * noise3(x * freq, y * freq, z * freq);
      freq *= 2; amp *= 0.5;
    }
    return sum; // ~0..1
  }

  var SCALE_X = 3.2;   // fewer, bigger billowing cells across the width
  var SCALE_Y = 2.2;
  var TIME = 0.13;     // churn speed
  var AMP = 0.42;      // how lumpy the cloud's top edge is
  var RAMP_DUR = 16;   // seconds for the cloud to climb to full height

  function frame(level, t) {
    var out = "";
    var rowsM1 = rows - 1;
    for (var r = 0; r < rows; r++) {
      var yb = 1 - r / rowsM1;        // 0 at bottom, 1 at top
      for (var c = 0; c < cols; c++) {
        var nx = c / cols;
        var lump = (fbm(nx * SCALE_X, yb * SCALE_Y, t) - 0.5) * AMP;
        var d = (level - yb) + lump;  // >0 inside the cloud body
        if (d <= 0) { out += " "; }
        else {
          var idx = Math.floor(d * 9 / 0.6);
          if (idx > 9) idx = 9;
          out += ramp[idx];
        }
      }
      if (r < rowsM1) out += "\n";
    }
    art.textContent = out;
  }

  function ease(x) { return x < 0 ? 0 : x > 1 ? 1 : x * x * (3 - 2 * x); }

  var start = null, last = 0, FPS = 14, MIN_DT = 1000 / FPS;
  function loop(ts) {
    if (start === null) start = ts;
    if (ts - last >= MIN_DT) {
      last = ts;
      var elapsed = (ts - start) / 1000;
      var t = elapsed * TIME;
      var level = ease(elapsed / RAMP_DUR) * 0.86 + 0.05;
      frame(level, t);
    }
    requestAnimationFrame(loop);
  }

  measure();
  var resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(measure, 150);
  });

  if (reduced) {
    frame(0.9, 0); // static fully-formed cloud, no animation
  } else {
    requestAnimationFrame(loop);
  }
})();
</script>
